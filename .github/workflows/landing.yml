name: Deploy Landing Site

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
  pull_request:
    branches: [main]
    paths:
      - 'landing/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        working-directory: landing
        run: npm ci

      - name: Build
        working-directory: landing
        run: npm run build
        env:
          # These are only needed at runtime, not build time.
          # Set them as Vercel environment variables in the dashboard.
          STRIPE_SECRET_KEY: placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          STRIPE_STARTER_PRICE_ID: placeholder
          STRIPE_PRO_PRICE_ID: placeholder
          NEXT_PUBLIC_BASE_URL: https://gsocai.com

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: landing
          vercel-args: '--prod'
