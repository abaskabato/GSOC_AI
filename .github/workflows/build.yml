name: Build GSOC AI Desktop App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: gsoc-ai/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('gsoc-ai/package-lock.json') }}

      - name: Install frontend dependencies
        working-directory: gsoc-ai
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libwebkitgtk-6.0-dev libgdk-pixbuf-2.0-dev libpango1.0-dev libatk1.0-dev libcairo2-dev libglib2.0-dev libwebkit2gtk-4.1-dev

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Build Tauri app
        working-directory: gsoc-ai
        shell: bash
        run: npm run tauri build ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gsoc-ai-${{ matrix.platform }}${{ matrix.target != '' && format('- {0}', matrix.target) || '' }}
          path: |
            gsoc-ai/src-tauri/target/release/bundle/**/*.dmg
            gsoc-ai/src-tauri/target/release/bundle/**/*.exe
            gsoc-ai/src-tauri/target/release/bundle/**/*.msi
            gsoc-ai/src-tauri/target/release/bundle/**/*.AppImage
            gsoc-ai/src-tauri/target/release/bundle/**/*.deb
          if-no-files-found: ignore

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
