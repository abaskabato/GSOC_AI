name: Build & Release GSOC AI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            args: ''
            label: linux-x64
          - platform: windows-latest
            args: ''
            label: windows-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: gsoc-ai/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: gsoc-ai/src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libappindicator3-dev

      - name: Install frontend dependencies
        working-directory: gsoc-ai
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gsoc-ai
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('GSOC AI {0}', github.ref_name) || '' }}
          releaseDraft: ${{ startsWith(github.ref, 'refs/tags/') }}
          prerelease: false
          includeDebug: false
          includeRelease: true

      - name: Upload build artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: gsoc-ai-${{ matrix.label }}
          path: |
            gsoc-ai/src-tauri/target/**/bundle/**/*.dmg
            gsoc-ai/src-tauri/target/**/bundle/**/*.exe
            gsoc-ai/src-tauri/target/**/bundle/**/*.msi
            gsoc-ai/src-tauri/target/**/bundle/**/*.AppImage
            gsoc-ai/src-tauri/target/**/bundle/**/*.deb
          if-no-files-found: ignore
