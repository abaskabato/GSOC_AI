name: Build GSOC AI Desktop App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
          - platform: 'windows-latest'
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: gsoc-ai/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('gsoc-ai/package-lock.json') }}

      - name: Install frontend dependencies
        working-directory: gsoc-ai
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-latest'
        run: brew install create-dmg

      - name: Build Tauri app
        working-directory: gsoc-ai
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --target "${{ matrix.target }}"
          else
            npm run tauri build
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gsoc-ai-${{ matrix.platform }}${{ matrix.target != '' && format('- {0}', matrix.target) || '' }}
          path: |
            gsoc-ai/src-tauri/target/release/bundle/**/*.dmg
            gsoc-ai/src-tauri/target/release/bundle/**/*.exe
            gsoc-ai/src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: ignore
